# ── Servidor ────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Base de Datos ────────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${DB_HOST:${PGHOST:localhost}}:${DB_PORT:${PGPORT:5432}}/${DB_NAME:${PGDATABASE:brixo}}?sslmode=${DB_SSL_MODE:require}}
spring.datasource.username=${DB_USER:${PGUSER:postgres}}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP (pool de conexiones) ───────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:3}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway (migraciones) ────────────────────────────────────────────────────
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ── Endpoint de migraciones (invocación manual) ───────────────────────────
migration.endpoint.enabled=${MIGRATION_ENDPOINT_ENABLED:false}

# ── Thymeleaf ───────────────────────────────────────────────────────────────
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ── Spring Security ──────────────────────────────────────────────────────────
spring.security.user.name=unused
spring.security.user.password=unused

# ── Sesiones ────────────────────────────────────────────────────────────────
server.servlet.session.timeout=30m

# ── Subida de archivos ──────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ── LLM (cotizador IA) ─────────────────────────────────────────────────────
# Proveedor: groq | openai | anthropic
llm.provider=${LLM_PROVIDER:groq}
llm.api-key=${LLM_API_KEY:}
llm.model=${LLM_MODEL:}

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.brixo=INFO
logging.level.org.springframework.security=WARN
