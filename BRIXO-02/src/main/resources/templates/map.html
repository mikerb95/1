<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mapa de Profesionales – Brixo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link rel="stylesheet" th:href="@{/css/brixo.css}">
    <link rel="icon" th:href="@{/favicon.svg}" type="image/svg+xml">

    <style>
        body { background: var(--neutral-50); }
        .map-layout {
            display: grid;
            grid-template-columns: 340px 1fr;
            height: calc(100vh - 70px);
        }
        .map-sidebar {
            background: #fff;
            border-right: 1px solid var(--neutral-200);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .map-sidebar__header {
            padding: 20px 20px 12px;
            border-bottom: 1px solid var(--neutral-200);
            flex-shrink: 0;
        }
        .map-sidebar__title {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--neutral-900);
            letter-spacing: -0.02em;
            margin: 0 0 12px;
        }
        .map-sidebar__search {
            position: relative;
        }
        .map-sidebar__search input {
            width: 100%;
            padding: 10px 36px 10px 14px;
            border: 1.5px solid var(--neutral-200);
            border-radius: var(--radius-full);
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .map-sidebar__search input:focus { border-color: var(--primary-color); }
        .map-sidebar__search i {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .map-sidebar__filters {
            padding: 12px 20px;
            border-bottom: 1px solid var(--neutral-200);
            display: flex;
            gap: 8px;
            overflow-x: auto;
            flex-shrink: 0;
        }
        .filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border: 1.5px solid var(--neutral-200);
            border-radius: var(--radius-full);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            background: #fff;
            color: var(--neutral-700);
            transition: all 0.15s;
        }
        .filter-chip:hover,
        .filter-chip.active {
            border-color: var(--primary-color);
            background: var(--primary-color);
            color: #fff;
        }
        .map-sidebar__list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .pro-card {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: background 0.15s;
            border: 1.5px solid transparent;
            text-decoration: none;
            color: inherit;
        }
        .pro-card:hover { background: var(--neutral-50); color: inherit; }
        .pro-card.active { background: #EBF8FF; border-color: var(--primary-color); }
        .pro-card__avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--primary-color);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .pro-card__info { flex: 1; min-width: 0; }
        .pro-card__name {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--neutral-900);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .pro-card__city {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .pro-card__badge {
            flex-shrink: 0;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            margin-top: 6px;
        }
        .pro-card__badge--unverified { background: var(--neutral-300); }
        .map-container { position: relative; flex: 1; }
        #map { width: 100%; height: 100%; }
        .map-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .map-empty i { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
        @media (max-width: 767.98px) {
            .map-layout { grid-template-columns: 1fr; grid-template-rows: 50vh 50vh; }
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/layout :: navbar(overlay=false)}"></div>

    <div class="map-layout">
        <!-- Sidebar -->
        <aside class="map-sidebar">
            <div class="map-sidebar__header">
                <h1 class="map-sidebar__title">Profesionales cercanos</h1>
                <div class="map-sidebar__search">
                    <input type="text" id="searchInput" placeholder="Buscar por nombre o ciudad...">
                    <i class="fas fa-search"></i>
                </div>
            </div>

            <!-- Filtros por categoría -->
            <div class="map-sidebar__filters" th:if="${not #lists.isEmpty(categorias)}">
                <button class="filter-chip active" data-cat="all">Todos</button>
                <button th:each="cat : ${categorias}"
                        th:text="${cat.nombre}"
                        th:attr="data-cat=${cat.id}"
                        class="filter-chip">Categoría</button>
            </div>

            <!-- Lista de profesionales -->
            <div class="map-sidebar__list" id="proList">
                <div th:if="${#lists.isEmpty(contratistas)}" class="map-empty">
                    <i class="fas fa-hard-hat d-block"></i>
                    <p class="mb-0">Aún no hay profesionales registrados.</p>
                </div>

                <div th:each="pro : ${contratistas}"
                     class="pro-card"
                     th:attr="data-id=${pro.id}, data-lat=${pro.ubicacionMapa}"
                     th:id="'pro-' + ${pro.id}"
                     onclick="focusPro(this)">
                    <div class="pro-card__avatar"
                         th:text="${#strings.substring(pro.nombre,0,1).toUpperCase()}">P</div>
                    <div class="pro-card__info">
                        <div class="pro-card__name" th:text="${pro.nombre}">Nombre</div>
                        <div class="pro-card__city">
                            <i class="fas fa-map-marker-alt"></i>
                            <span th:text="${pro.ciudad != null ? pro.ciudad : 'Sin ciudad'}">Ciudad</span>
                        </div>
                    </div>
                    <div th:class="${pro.verificado} ? 'pro-card__badge' : 'pro-card__badge pro-card__badge--unverified'"></div>
                </div>
            </div>
        </aside>

        <!-- Mapa -->
        <div class="map-container">
            <div id="map"></div>
        </div>
    </div>

    <!-- Datos para JS -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        const contratistas = /*[[${contratistas}]]*/ [];
        /*]]>*/
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WLs=" crossorigin=""></script>
    <div th:replace="~{fragments/layout :: navbarJs}"></div>

    <script>
        // Inicializar mapa centrado en Colombia
        const map = L.map('map').setView([4.7110, -74.0721], 6);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            maxZoom: 19
        }).addTo(map);

        const markers = {};

        // Icono personalizado
        const brixoIcon = L.divIcon({
            className: '',
            html: '<div style="background:var(--primary-color,#009FD9);width:32px;height:32px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.25)"></div>',
            iconSize: [32, 32],
            iconAnchor: [16, 32]
        });

        // Renderizar marcadores
        if (Array.isArray(contratistas)) {
            contratistas.forEach(pro => {
                let lat = null, lng = null;

                // ubicacionMapa puede ser "lat,lng" o null
                if (pro.ubicacionMapa) {
                    const parts = pro.ubicacionMapa.split(',');
                    if (parts.length === 2) {
                        lat = parseFloat(parts[0]);
                        lng = parseFloat(parts[1]);
                    }
                }

                if (lat && lng && !isNaN(lat) && !isNaN(lng)) {
                    const marker = L.marker([lat, lng], { icon: brixoIcon })
                        .addTo(map)
                        .bindPopup(`
                            <div style="min-width:160px">
                                <strong style="font-size:0.9rem">${pro.nombre || ''}</strong><br>
                                <small style="color:#666">${pro.ciudad || 'Sin ciudad'}</small>
                                ${pro.verificado ? '<br><span style="color:#22c55e;font-size:0.75rem"><i class="fas fa-check-circle"></i> Verificado</span>' : ''}
                            </div>
                        `);
                    markers[pro.id] = marker;
                }
            });
        }

        function focusPro(el) {
            document.querySelectorAll('.pro-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            const id = el.getAttribute('data-id');
            if (markers[id]) {
                map.flyTo(markers[id].getLatLng(), 14, { duration: 0.8 });
                markers[id].openPopup();
            }
        }

        // Búsqueda en sidebar
        document.getElementById('searchInput').addEventListener('input', function () {
            const q = this.value.toLowerCase();
            document.querySelectorAll('.pro-card').forEach(card => {
                const name = card.querySelector('.pro-card__name')?.textContent.toLowerCase() || '';
                const city = card.querySelector('.pro-card__city span')?.textContent.toLowerCase() || '';
                card.style.display = (name.includes(q) || city.includes(q)) ? '' : 'none';
            });
        });
    </script>
</body>
</html>
