<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nueva Solicitud – Brixo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/brixo.css}">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/layout :: navbar(overlay=false)}"></div>

    <div class="container py-5" style="max-width:700px">
        <h2 class="fw-bold mb-4">
            <i class="fas fa-clipboard-list text-primary me-2"></i>Nueva Solicitud de Servicio
        </h2>

        <div th:if="${prefillTitulo != null}" class="alert alert-info rounded-3 d-flex align-items-center mb-4">
            <i class="fas fa-robot me-2"></i>
            <span>Solicitud pre-llenada a partir de tu cotización IA. Revisa y ajusta los datos.</span>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <form th:action="@{/solicitud/guardar}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Título del servicio</label>
                        <input type="text" name="titulo" class="form-control" required maxlength="150"
                               th:value="${prefillTitulo}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Descripción detallada</label>
                        <textarea name="descripcion" class="form-control" rows="6" required
                                  th:text="${prefillDescripcion}"></textarea>
                    </div>
                    <div class="row g-3 mb-4">
                        <div class="col-sm-6">
                            <label class="form-label fw-semibold">Presupuesto estimado (opcional)</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" name="presupuesto" class="form-control" min="0" step="0.01">
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label fw-semibold">Ubicación (opcional)</label>
                            <input type="text" name="ubicacion" class="form-control"
                                   placeholder="Ej: Bogotá, Chapinero">
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary rounded-pill px-4">
                            <i class="fas fa-paper-plane me-2"></i>Publicar Solicitud
                        </button>
                        <a th:href="@{/panel}" class="btn btn-outline-secondary rounded-pill px-4">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
