<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mi Panel – Brixo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/brixo.css}">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/layout :: navbar(overlay=false)}"></div>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">
                <i class="fas fa-user-circle text-primary me-2"></i>
                Hola, <span sec:authentication="principal.nombre">Usuario</span>
            </h2>
            <a th:href="@{/cotizador}" class="btn btn-primary rounded-pill">
                <i class="fas fa-robot me-2"></i>Cotizador IA
            </a>
        </div>

        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Mis solicitudes -->
        <div class="card border-0 shadow-sm rounded-4 mb-4">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold"><i class="fas fa-clipboard-list text-primary me-2"></i>Mis Solicitudes</h5>
                <a th:href="@{/solicitud/nueva}" class="btn btn-sm btn-outline-primary rounded-pill">
                    <i class="fas fa-plus me-1"></i>Nueva
                </a>
            </div>
            <div class="card-body p-0">
                <div th:if="${#lists.isEmpty(solicitudes)}" class="text-center py-5 text-muted">
                    <i class="fas fa-inbox fa-3x mb-3 d-block opacity-25"></i>
                    Aún no tienes solicitudes. <a th:href="@{/cotizador}">Genera una cotización</a> para empezar.
                </div>
                <div th:unless="${#lists.isEmpty(solicitudes)}" class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Título</th>
                                <th>Estado</th>
                                <th>Presupuesto</th>
                                <th>Fecha</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="s : ${solicitudes}">
                                <td th:text="${s.titulo}"></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${s.estado.name() == 'ABIERTA'} ? 'bg-success' :
                                                          (${s.estado.name() == 'ASIGNADA'} ? 'bg-warning text-dark' : 'bg-secondary')"
                                          th:text="${s.estado}"></span>
                                </td>
                                <td th:text="${'$' + s.presupuesto}"></td>
                                <td th:text="${#temporals.format(s.creadoEn, 'dd/MM/yyyy')}"></td>
                                <td>
                                    <form th:action="@{'/solicitud/eliminar/' + ${s.id}}" method="post"
                                          onsubmit="return confirm('¿Eliminar esta solicitud?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Mis cotizaciones IA -->
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 fw-bold"><i class="fas fa-robot text-primary me-2"></i>Cotizaciones Generadas</h5>
            </div>
            <div class="card-body p-0">
                <div th:if="${#lists.isEmpty(cotizaciones)}" class="text-center py-4 text-muted">
                    <small>Aún no has generado cotizaciones con IA.</small>
                </div>
                <div th:unless="${#lists.isEmpty(cotizaciones)}" class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr><th>Servicio</th><th>Complejidad</th><th>Estado</th><th>Fecha</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="c : ${cotizaciones}">
                                <td th:text="${c.servicioPrincipal}"></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${c.complejidad.name() == 'bajo'} ? 'bg-success' :
                                                          (${c.complejidad.name() == 'medio'} ? 'text-dark' : 'bg-danger')"
                                          th:style="${c.complejidad.name() == 'medio'} ? 'background-color:#fd7e14' : ''"
                                          th:text="${c.complejidad}"></span>
                                </td>
                                <td th:text="${c.estado}"></td>
                                <td th:text="${#temporals.format(c.confirmadoEn, 'dd/MM/yyyy')}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
