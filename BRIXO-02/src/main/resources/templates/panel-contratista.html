<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel Contratista – Brixo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/brixo.css}">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/layout :: navbar(overlay=false)}"></div>

    <div class="container py-5">
        <h2 class="fw-bold mb-4">
            <i class="fas fa-tools text-primary me-2"></i>
            Panel Contratista – <span sec:authentication="principal.nombre">Contratista</span>
        </h2>

        <!-- Solicitudes abiertas -->
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 fw-bold">
                    <i class="fas fa-clipboard-list text-success me-2"></i>Solicitudes Abiertas
                </h5>
            </div>
            <div class="card-body p-0">
                <div th:if="${#lists.isEmpty(solicitudesAbiertas)}" class="text-center py-5 text-muted">
                    <i class="fas fa-check-circle fa-3x mb-3 d-block opacity-25"></i>
                    No hay solicitudes abiertas en este momento.
                </div>
                <div th:unless="${#lists.isEmpty(solicitudesAbiertas)}" class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Título</th>
                                <th>Cliente</th>
                                <th>Presupuesto</th>
                                <th>Ubicación</th>
                                <th>Fecha</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="s : ${solicitudesAbiertas}">
                                <td th:text="${s.titulo}"></td>
                                <td th:text="${s.cliente.nombre}"></td>
                                <td th:text="${'$' + s.presupuesto}"></td>
                                <td th:text="${s.ubicacion}"></td>
                                <td th:text="${#temporals.format(s.creadoEn, 'dd/MM/yyyy')}"></td>
                                <td>
                                    <a th:href="@{'/mensajes/chat/' + ${s.cliente.id} + '/CLIENTE'}"
                                       class="btn btn-sm btn-outline-primary rounded-pill">
                                        <i class="fas fa-comments me-1"></i>Contactar
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
