<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar sesión – Brixo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/brixo.css}">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
    <div class="card border-0 shadow rounded-4 p-4" style="width:100%;max-width:420px">
        <div class="text-center mb-4">
            <a th:href="@{/}" class="text-decoration-none text-dark">
                <i class="fas fa-hard-hat fa-2x text-warning"></i>
                <h4 class="fw-bold mt-2 mb-0">Brixo</h4>
            </a>
        </div>

        <div th:if="${error}"   class="alert alert-danger small"  th:text="${error}"></div>
        <div th:if="${logout}"  class="alert alert-success small" th:text="${logout}"></div>
        <div th:if="${success}" class="alert alert-success small" th:text="${success}"></div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="mb-3">
                <label for="correo" class="form-label fw-semibold">Correo electrónico</label>
                <input type="email" id="correo" name="correo" class="form-control" required autofocus>
            </div>
            <div class="mb-4">
                <label for="contrasena" class="form-label fw-semibold">Contraseña</label>
                <div class="input-group">
                    <input type="password" id="contrasena" name="contrasena" class="form-control" required>
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword" aria-label="Mostrar/ocultar contraseña">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold">
                <i class="fas fa-sign-in-alt me-2"></i>Ingresar
            </button>
        </form>

        <hr class="my-3">
        <p class="text-center small mb-0">
            ¿No tienes cuenta?
            <a th:href="@{/register}" class="text-primary fw-semibold">Regístrate</a>
        </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('togglePassword').addEventListener('click', function() {
            const input = document.getElementById('contrasena');
            const icon = this.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    </script>
</body>
</html>
